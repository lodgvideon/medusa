# medusa: self-hosted GitHub Actions runner on Kubernetes.
#
# Registers an *ephemeral* runner against github.com/lodgvideon/medusa so the CI
# workflow (.github/workflows/ci.yml) can run on your own cluster. A privileged
# Docker-in-Docker sidecar provides the `docker build` job; the runner reaches it
# over loopback only (see the securityContext + 127.0.0.1 note below), so no other
# pod can drive the daemon.
#
# Prereq — create the PAT Secret first (NOT stored in this file):
#   kubectl create secret generic github-runner \
#     --from-literal=token=ghp_xxx      # classic PAT with the `repo` scope
#   # (fine-grained PAT: Administration=read+write, Metadata=read on the repo)
#
# Apply:   kubectl apply -f k8s/runner.yaml      # or: make runner
# Verify:  bash k8s/runner-check.sh              # or: make runner-check
#          # then GitHub → repo Settings → Actions → Runners shows it "Idle"
# Scale:   kubectl scale deploy/github-runner --replicas=2   # more parallelism
# Tear:    kubectl delete -f k8s/runner.yaml
#
# SECURITY: self-hosted runners must not execute untrusted code. The CI workflow
# only schedules `push` events here (trusted: push requires write access); fork
# pull_requests stay on GitHub-hosted runners. Keep it that way on a public repo.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  labels: { app: github-runner }
spec:
  # One always-registered runner. Raise replicas for concurrent jobs — each pod
  # is an independent runner with its own DinD daemon.
  replicas: 1
  selector:
    matchLabels: { app: github-runner }
  # Ephemeral runners exit after one job; recreate (not roll) so a finished pod is
  # replaced cleanly rather than two overlapping during a rollout.
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app: github-runner }
    spec:
      # A job may be mid-build; give Docker time to stop without a SIGKILL.
      terminationGracePeriodSeconds: 30
      containers:
        # ---- the runner agent ----
        - name: runner
          image: myoung34/github-runner:latest # pin to a digest/tag for reproducibility
          imagePullPolicy: IfNotPresent
          env:
            - name: REPO_URL
              value: https://github.com/lodgvideon/medusa
            - name: RUNNER_SCOPE
              value: repo
            # Custom label the workflow targets via runs-on: [self-hosted, medusa].
            - name: LABELS
              value: medusa
            - name: RUNNER_NAME_PREFIX
              value: medusa-k8s
            # Fresh runner registration per job — no leftover workspace or state
            # between runs (matches GitHub-hosted semantics). The container exits
            # after each job and Kubernetes restarts it, re-registering via the PAT.
            - name: EPHEMERAL
              value: "true"
            # The image self-updates by default, which fights a pinned tag; the
            # workflow's actions are fetched fresh regardless.
            - name: DISABLE_AUTO_UPDATE
              value: "true"
            # Drive the sidecar daemon over a unix socket shared via an emptyDir.
            # No TCP at all — the daemon is unreachable from outside the pod.
            - name: DOCKER_HOST
              value: unix:///run/dind/docker.sock
            # PAT used to fetch a short-lived runner registration token at startup.
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef: { name: github-runner, key: token }
          resources:
            requests: { cpu: 500m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
          volumeMounts:
            - { name: docker-sock, mountPath: /run/dind }
        # ---- Docker-in-Docker sidecar (powers the `docker build` job) ----
        - name: dind
          image: docker:27-dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true # dockerd needs full kernel caps to manage containers
          # Listen ONLY on a unix socket in the shared emptyDir — no TCP listener,
          # so the daemon is reachable by the runner container but by nothing
          # outside the pod. Leading "dockerd" stops the image entrypoint from
          # injecting its own (insecure, Docker-27-deprecated) tcp://0.0.0.0:2375.
          args: ["dockerd", "--host=unix:///run/dind/docker.sock"]
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
          volumeMounts:
            - { name: docker-sock, mountPath: /run/dind }
            # Image/layer storage. emptyDir keeps the build cache across jobs for a
            # pod's lifetime; swap for a PVC to survive pod restarts.
            - { name: dind-storage, mountPath: /var/lib/docker }
      volumes:
        # Shared dir holding the Docker socket (runner ⇄ dind, never leaves the pod).
        - name: docker-sock
          emptyDir: {}
        - name: dind-storage
          emptyDir: {}
